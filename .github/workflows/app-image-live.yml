name: Deploy Live

on:
    push:
        tags:
            - 'v*'
    workflow_dispatch:

env:
    COOLIFY_APP_UUID: icskwwcoscc000ksggckksw4

jobs:
    lint:
        runs-on: self-hosted
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: '24'
                  cache: 'npm'

            - run: npm ci

            - run: npm run lint

            - run: npm run format:check

            - run: npm run build
              env:
                  DATABASE_URL: postgresql://build:build@localhost:5432/build

    e2e:
        runs-on: self-hosted
        needs: [lint]
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: '24'
                  cache: 'npm'

            - run: npm ci

            - name: Install Playwright browsers
              run: npx playwright install chromium --with-deps

            - name: Run E2E tests against beta
              run: npx playwright test
              env:
                  E2E_BASE_URL: https://beta.xn--kchentakt-q9a.de
                  E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
                  E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}

            - uses: actions/upload-artifact@v4
              if: ${{ !cancelled() }}
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 14

    deploy:
        runs-on: self-hosted
        needs: [lint, e2e]
        steps:
            - name: Trigger Coolify redeploy
              run: |
                  curl -fsSL -X GET \
                    "https://deploy.tecfriends.ddns.net/api/v1/deploy?uuid=${{ env.COOLIFY_APP_UUID }}&force=false" \
                    -H "Authorization: Bearer ${{ secrets.DEPLOYMENT_KEY }}"
