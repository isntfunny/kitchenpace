name: Build & Push App Image (live/production)

on:
  push:
    branches: [live]
    paths-ignore:
      - 'services/scraper/**'
      - 'k6/**'
      - '*.md'
  workflow_dispatch:

env:
  REGISTRY: registry.isntfunny.de
  IMAGE_APP: kitchenpace/app
  IMAGE_WORKER: kitchenpace/worker
  COOLIFY_APP_UUID: icskwwcoscc000ksggckksw4

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push app (runner target)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: runner
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_APP }}:live
            ${{ env.REGISTRY }}/${{ env.IMAGE_APP }}:${{ github.sha }}
          build-args: DEBUG=0
          cache-from: type=gha,scope=runner-live
          cache-to: type=gha,mode=max,scope=runner-live

      - name: Build and push worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: worker
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_WORKER }}:live
            ${{ env.REGISTRY }}/${{ env.IMAGE_WORKER }}:${{ github.sha }}
          cache-from: type=gha,scope=worker-live
          cache-to: type=gha,mode=max,scope=worker-live

      - name: Trigger Coolify redeploy
        run: |
          curl -fsSL -X GET \
            "https://deploy.tecfriends.ddns.net/api/v1/deploy?uuid=${{ env.COOLIFY_APP_UUID }}&force=false" \
            -H "Authorization: Bearer ${{ secrets.DEPLOYMENT_KEY }}"
