name: Deploy Live

on:
    push:
        tags:
            - 'v*'
    workflow_dispatch:

env:
    COOLIFY_APP_UUID: icskwwcoscc000ksggckksw4

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - run: npm ci

            - run: npm run lint

    deploy:
        runs-on: ubuntu-latest
        needs: [lint]
        steps:
            - name: Trigger Coolify redeploy
              run: |
                  curl -fsSL -X GET \
                    "https://deploy.tecfriends.ddns.net/api/v1/deploy?uuid=${{ env.COOLIFY_APP_UUID }}&force=false" \
                    -H "Authorization: Bearer ${{ secrets.DEPLOYMENT_KEY }}"
