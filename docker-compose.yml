services:
    postgres:
        image: postgres:16-alpine
        container_name: kitchenpace-db
        environment:
            POSTGRES_USER: kitchenpace
            POSTGRES_PASSWORD: kitchenpace_secret
            POSTGRES_DB: kitchenpace
        volumes:
            - postgres_data:/var/lib/postgresql/data
        ports:
            - '64000:5432'
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U kitchenpace -d kitchenpace']
            interval: 10s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        container_name: kitchenpace-redis
        command: ['redis-server', '--appendonly', 'yes', '--appendfsync', 'everysec']
        volumes:
            - redis_data:/data
        ports:
            - '62984:6379'
        healthcheck:
            test: ['CMD-SHELL', 'redis-cli ping | grep PONG']
            interval: 10s
            timeout: 3s
            retries: 5

    opensearch:
        image: opensearchproject/opensearch:3.0.0
        container_name: kitchenpace-opensearch
        environment:
            discovery.type: single-node
            plugins.security.disabled: 'true'
            OPENSEARCH_JAVA_OPTS: '-Xms128m -Xmx256m -XX:MaxDirectMemorySize=64m'
            bootstrap.memory_lock: 'true'
            OPENSEARCH_INITIAL_ADMIN_PASSWORD: 1snt-Funny1
        ulimits:
            memlock:
                soft: -1
                hard: -1
        ports:
            - '9200:9200'
            - '9600:9600'
        volumes:
            - opensearch_data:/usr/share/opensearch/data
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'curl -fsSL http://localhost:9200/_cluster/health | grep -q "\"status\""',
                ]
            interval: 15s
            timeout: 5s
            retries: 5

    beta-kitchenpace:
        build:
            context: .
            dockerfile: Dockerfile
            target: app
            args:
                DATABASE_URL: postgresql://kitchenpace:kitchenpace_secret@postgres:5432/kitchenpace
                REACT_PROFILE: 1
        image: kitchenpace:beta
        container_name: kitchenpace-app
        environment:
            - SCRAPLER_URL=http://scraper:8000
        depends_on:
            postgres:
                condition: service_healthy
            opensearch:
                condition: service_healthy
        restart: unless-stopped
        healthcheck:
            test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3000/api/health']
            interval: 15s
            timeout: 5s
            retries: 3
            start_period: 30s

    worker:
        image: kitchenpace:beta
        command: ['npm', 'run', 'worker']
        container_name: kitchenpace-worker
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
            opensearch:
                condition: service_healthy
        restart: unless-stopped
        environment:
            SKIP_MIGRATIONS: '1'
            BACKUP_DIR: /tmp/backups

    scraper:
        image: registry.isntfunny.de/kitchenpace/scraper:latest
        pull_policy: always
        container_name: kitchenpace-scraper
        ports:
            - '34215:8000'
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://127.0.0.1:8000/health']
            interval: 1s
            timeout: 3s
            retries: 10
        restart: always

volumes:
    postgres_data:
    redis_data:
    opensearch_data:
