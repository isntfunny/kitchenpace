name: Deploy Live

on:
    push:
        tags:
            - 'v*'
    workflow_dispatch:

env:
    COOLIFY_APP_UUID: z3vcihuvscm7lxdxh4ssg63j
    IMAGE: registry.isntfunny.de/kitchenpace

jobs:
    build-image:
        runs-on: self-hosted
        steps:
            - uses: actions/checkout@v4

            - name: Build and push Docker image
              run: |
                  TAG="${GITHUB_REF_NAME:-latest}"
                  docker build -t "$IMAGE:$TAG" -t "$IMAGE:latest" .
                  docker push "$IMAGE:$TAG"
                  docker push "$IMAGE:latest"

    e2e:
        runs-on: self-hosted
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: '24'

            - name: Cache node_modules
              id: cache
              uses: actions/cache@v4
              with:
                  path: node_modules
                  key: node-modules-${{ hashFiles('package-lock.json') }}

            - name: Install dependencies
              if: steps.cache.outputs.cache-hit != 'true'
              run: npm ci

            - name: Install Playwright browsers
              run: npx playwright install chromium --with-deps

            - name: Run E2E tests against beta
              run: npx playwright test
              env:
                  E2E_BASE_URL: https://beta.xn--kchentakt-q9a.de
                  E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
                  E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}

            - uses: actions/upload-artifact@v4
              if: ${{ !cancelled() }}
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 14

    deploy:
        runs-on: self-hosted
        needs: [e2e, build-image]
        steps:
            - name: Trigger Coolify redeploy
              run: |
                  curl -fsSL -X GET \
                    "https://deploy.tecfriends.ddns.net/api/v1/deploy?uuid=${{ env.COOLIFY_APP_UUID }}&force=false" \
                    -H "Authorization: Bearer ${{ secrets.DEPLOYMENT_KEY }}"
