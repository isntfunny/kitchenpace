version: '3.8'

services:
    redis:
        image: redis:7-alpine
        container_name: kitchenpace-redis
        environment:
            REDIS_PASSWORD: ${REDIS_PASSWORD:-kitchenpace_secret}
        command: ['redis-server', '--requirepass', '${REDIS_PASSWORD:-kitchenpace_secret}']
        volumes:
            - redis_data:/data
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    "redis-cli -a '${REDIS_PASSWORD:-kitchenpace_secret}' ping | grep PONG",
                ]
            interval: 10s
            timeout: 3s
            retries: 5

    opensearch:
        image: opensearchproject/opensearch:3.0.0
        container_name: kitchenpace-opensearch
        environment:
            discovery.type: single-node
            plugins.security.disabled: 'true'
            OPENSEARCH_JAVA_OPTS: '-Xms512m -Xmx512m'
            bootstrap.memory_lock: 'true'
            OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-1snt-Funny1}
        ulimits:
            memlock:
                soft: -1
                hard: -1
        volumes:
            - opensearch_data:/usr/share/opensearch/data
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'curl -fsSL http://localhost:9200/_cluster/health | grep -q "\"status\""',
                ]
            interval: 15s
            timeout: 5s
            retries: 5

    app:
        build:
            context: .
            dockerfile: Dockerfile
            target: runner
            extra_hosts:
                - 'host.docker.internal:host-gateway'
            args:
                - DATABASE_URL=${DATABASE_URL}
        container_name: kitchenpace-app
        env_file:
            - .env
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        depends_on:
            redis:
                condition: service_healthy
            opensearch:
                condition: service_healthy
            scraper:
                condition: service_healthy
        restart: unless-stopped

    worker:
        build:
            context: .
            dockerfile: Dockerfile
            target: worker
        container_name: kitchenpace-worker
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        depends_on:
            redis:
                condition: service_healthy
            opensearch:
                condition: service_healthy
        restart: unless-stopped
        environment:
            DATABASE_URL: ${DATABASE_URL:-postgresql://kitchenpace:kitchenpace_secret@host.docker.internal:5432/live_kitchenpace}
            REDIS_HOST: redis
            REDIS_PORT: 6379
            REDIS_PASSWORD: ${REDIS_PASSWORD:-}
            OPENSEARCH_URL: http://opensearch:9200
            OPENSEARCH_INDEX: recipes
            OPENSEARCH_INGREDIENTS_INDEX: ingredients
            BACKUP_DIR: /app/backups
        volumes:
            - worker_backups:/app/backups

    scraper:
        image: registry.isntfunny.de/kitchenpace/scraper:latest
        container_name: kitchenpace-scraper
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://127.0.0.1:8000/health']
            interval: 1s
            timeout: 3s
            retries: 10
        restart: always

volumes:
    redis_data:
    opensearch_data:
    worker_backups:
