version: '3.8'

services:
    redis:
        image: redis:7-alpine
        container_name: kitchenpace-redis
        environment:
            REDIS_PASSWORD: ${REDIS_PASSWORD:-kitchenpace_secret}
        command:
            [
                'redis-server',
                '--requirepass',
                '${REDIS_PASSWORD:-kitchenpace_secret}',
                '--appendonly',
                'yes',
                '--appendfsync',
                'everysec',
            ]
        volumes:
            - /data/kitchenpace/redis:/data
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    "redis-cli -a '${REDIS_PASSWORD:-kitchenpace_secret}' ping | grep PONG",
                ]
            interval: 10s
            timeout: 3s
            retries: 5

    opensearch:
        image: opensearchproject/opensearch:3.0.0
        container_name: kitchenpace-opensearch
        user: '1000:1000'
        environment:
            discovery.type: single-node
            plugins.security.disabled: 'true'
            OPENSEARCH_JAVA_OPTS: '-Xms128m -Xmx256m -XX:MaxDirectMemorySize=64m'
            bootstrap.memory_lock: 'true'
            OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-1snt-Funny1}
        ulimits:
            memlock:
                soft: -1
                hard: -1
        volumes:
            - /data/kitchenpace/opensearch:/usr/share/opensearch/data
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'curl -fsSL http://localhost:9200/_cluster/health | grep -q "\"status\""',
                ]
            interval: 15s
            timeout: 5s
            retries: 5

    live-kitchenpace:
        build:
            context: .
            dockerfile: Dockerfile
            target: app
            extra_hosts:
                - 'host.docker.internal:host-gateway'
            args:
                - DATABASE_URL=${DATABASE_URL}
        image: kitchenpace:live
        container_name: kitchenpace-app
        env_file:
            - .env
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        depends_on:
            redis:
                condition: service_healthy
            opensearch:
                condition: service_healthy
            scraper:
                condition: service_healthy
        restart: unless-stopped
        healthcheck:
            test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3000/api/health']
            interval: 15s
            timeout: 5s
            retries: 3
            start_period: 30s

    worker:
        image: kitchenpace:live
        entrypoint: null
        command: ['npm', 'run', 'worker']
        container_name: kitchenpace-worker
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        depends_on:
            redis:
                condition: service_healthy
            opensearch:
                condition: service_healthy
        restart: unless-stopped
        healthcheck:
            test: ['CMD-SHELL', 'pgrep -f "worker" > /dev/null']
            interval: 15s
            timeout: 5s
            retries: 3
            start_period: 15s
        environment:
            DATABASE_URL: ${DATABASE_URL:-postgresql://kitchenpace:kitchenpace_secret@host.docker.internal:5432/live_kitchenpace}
            REDIS_HOST: redis
            REDIS_PORT: 6379
            REDIS_PASSWORD: ${REDIS_PASSWORD:-}
            OPENSEARCH_URL: http://opensearch:9200
            OPENSEARCH_INDEX: recipes
            OPENSEARCH_INGREDIENTS_INDEX: ingredients
            BACKUP_DIR: /app/backups
        volumes:
            - /data/kitchenpace/worker-backups:/app/backups

    scraper:
        image: registry.isntfunny.de/kitchenpace/scraper:latest
        pull_policy: always
        container_name: kitchenpace-scraper
        environment:
            SEQ_URL: ${SEQ_URL:-}
            SEQ_API_KEY: ${SEQ_API_KEY:-}
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://127.0.0.1:8000/health']
            interval: 1s
            timeout: 3s
            retries: 10
        restart: always

    opensearch-exporter:
        image: quay.io/prometheuscommunity/elasticsearch-exporter:latest
        container_name: kitchenpace-opensearch-exporter
        command:
            - '--es.uri=http://opensearch:9200'
            - '--es.all'
            - '--es.indices'
            - '--es.shards'
        depends_on:
            opensearch:
                condition: service_healthy
        restart: unless-stopped
        networks:
            - default
            - monitoring_default

    redis-exporter:
        image: oliver006/redis_exporter:latest
        container_name: kitchenpace-redis-exporter
        environment:
            REDIS_ADDR: redis://redis:6379
            REDIS_PASSWORD: ${REDIS_PASSWORD:-kitchenpace_secret}
        depends_on:
            redis:
                condition: service_healthy
        restart: unless-stopped
        networks:
            - default
            - monitoring_default

networks:
    monitoring_default:
        external: true
