services:
    postgres:
        image: postgres:16-alpine
        container_name: kitchenpace-db
        environment:
            POSTGRES_USER: kitchenpace
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kitchenpace_secret}
            POSTGRES_DB: ${POSTGRES_DB:-kitchenpace}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        ports:
            - '64000:5432'
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U kitchenpace -d ${POSTGRES_DB:-kitchenpace}']
            interval: 10s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        container_name: kitchenpace-redis
        environment:
            REDIS_PASSWORD: ${REDIS_PASSWORD:-kitchenpace_secret}
        command: ['redis-server', '--requirepass', '${REDIS_PASSWORD:-kitchenpace_secret}']
        volumes:
            - redis_data:/data
        ports:
            - '62984:6379'
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    "redis-cli -a '${REDIS_PASSWORD:-kitchenpace_secret}' ping | grep PONG",
                ]
            interval: 10s
            timeout: 3s
            retries: 5

    opensearch:
        image: opensearchproject/opensearch:3.0.0
        container_name: kitchenpace-opensearch
        environment:
            discovery.type: single-node
            plugins.security.disabled: 'true'
            OPENSEARCH_JAVA_OPTS: '-Xms512m -Xmx512m'
            bootstrap.memory_lock: 'true'
            OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-1snt-Funny1}
        ulimits:
            memlock:
                soft: -1
                hard: -1
        ports:
            - '9200:9200'
            - '9600:9600'
        volumes:
            - opensearch_data:/usr/share/opensearch/data
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'curl -fsSL http://localhost:9200/_cluster/health | grep -q "\"status\""',
                ]
            interval: 15s
            timeout: 5s
            retries: 5

    app:
        build:
            context: .
            dockerfile: Dockerfile
            target: runner
            args:
                DATABASE_URL: ${DATABASE_URL:-postgresql://kitchenpace:kitchenpace_secret@postgres:5432/kitchenpace}
                DEBUG: ${DEBUG:-0}
        container_name: kitchenpace-app
        environment:
            - SCRAPLER_URL=http://scraper:8000
        depends_on:
            postgres:
                condition: service_healthy
            opensearch:
                condition: service_healthy
        restart: unless-stopped

    worker:
        build:
            context: .
            dockerfile: Dockerfile
            target: worker
            args:
                DATABASE_URL: ${DATABASE_URL:-postgresql://kitchenpace:kitchenpace_secret@postgres:5432/kitchenpace}
                REDIS_HOST: redis
                REDIS_PORT: 6379
                REDIS_PASSWORD: ${REDIS_PASSWORD:-}
        container_name: kitchenpace-worker
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
            opensearch:
                condition: service_healthy
        restart: unless-stopped
        environment:
            DATABASE_URL: ${DATABASE_URL:-postgresql://kitchenpace:kitchenpace_secret@postgres:5432/kitchenpace}
            REDIS_HOST: redis
            REDIS_PORT: 6379
            REDIS_PASSWORD: ${REDIS_PASSWORD:-}
            OPENSEARCH_URL: http://opensearch:9200
            OPENSEARCH_INDEX: recipes
            OPENSEARCH_INGREDIENTS_INDEX: ingredients
            BACKUP_DIR: /tmp/backups

    scraper:
        build:
            context: ./services/scraper
            dockerfile: Dockerfile
        container_name: kitchenpace-scraper
        ports:
            - '34215:8000'
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://127.0.0.1:8000/health']
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 20s
        restart: always

volumes:
    postgres_data:
    redis_data:
    opensearch_data:
