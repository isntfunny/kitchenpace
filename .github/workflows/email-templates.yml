name: Validate Email Templates

on:
    push:
        paths:
            - 'email-templates/**/*.mjml'
        branches: [main]
    pull_request:
        paths:
            - 'email-templates/**/*.mjml'
        branches: [main]

jobs:
    validate:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Install MJML
              run: npm install -g mjml

            - name: Validate MJML templates
              run: node email-templates/validate.mjs
