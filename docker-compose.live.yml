version: '3.8'

services:
    redis:
        image: redis:7-alpine
        container_name: kitchenpace-redis
        command: ['redis-server', '--appendonly', 'yes', '--appendfsync', 'everysec']
        volumes:
            - /data/kitchenpace/redis:/data
        healthcheck:
            test: ['CMD-SHELL', 'redis-cli ping | grep PONG']
            interval: 10s
            timeout: 3s
            retries: 5

    opensearch:
        image: opensearchproject/opensearch:3.0.0
        container_name: kitchenpace-opensearch
        user: '1000:1000'
        environment:
            discovery.type: single-node
            plugins.security.disabled: 'true'
            OPENSEARCH_JAVA_OPTS: '-Xms128m -Xmx256m -XX:MaxDirectMemorySize=64m'
            bootstrap.memory_lock: 'true'
        ulimits:
            memlock:
                soft: -1
                hard: -1
        volumes:
            - /data/kitchenpace/opensearch:/usr/share/opensearch/data
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'curl -fsSL http://localhost:9200/_cluster/health | grep -q "\"status\""',
                ]
            interval: 15s
            timeout: 5s
            retries: 5

    live-kitchenpace:
        image: registry.isntfunny.de/kitchenpace:latest
        pull_policy: always
        container_name: kitchenpace-app
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        depends_on:
            redis:
                condition: service_healthy
            opensearch:
                condition: service_healthy
            scraper:
                condition: service_healthy
        restart: unless-stopped
        healthcheck:
            test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3000/api/health']
            interval: 15s
            timeout: 5s
            retries: 3
            start_period: 30s

    worker:
        image: registry.isntfunny.de/kitchenpace:latest
        pull_policy: always
        command: ['npm', 'run', 'worker']
        container_name: kitchenpace-worker
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        depends_on:
            redis:
                condition: service_healthy
            opensearch:
                condition: service_healthy
        restart: unless-stopped
        environment:
            SKIP_MIGRATIONS: '1'
            BACKUP_DIR: /app/backups
        volumes:
            - /data/kitchenpace/worker-backups:/app/backups

    scraper:
        image: registry.isntfunny.de/kitchenpace/scraper:latest
        pull_policy: always
        container_name: kitchenpace-scraper
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://127.0.0.1:8000/health']
            interval: 1s
            timeout: 3s
            retries: 10
        restart: always

    opensearch-exporter:
        image: quay.io/prometheuscommunity/elasticsearch-exporter:latest
        container_name: kitchenpace-opensearch-exporter
        command:
            - '--es.uri=http://opensearch:9200'
            - '--es.all'
            - '--es.indices'
            - '--es.shards'
        depends_on:
            opensearch:
                condition: service_healthy
        restart: unless-stopped
        networks:
            - default
            - monitoring_default

    redis-exporter:
        image: oliver006/redis_exporter:latest
        container_name: kitchenpace-redis-exporter
        environment:
            REDIS_ADDR: redis://redis:6379
        depends_on:
            redis:
                condition: service_healthy
        restart: unless-stopped
        networks:
            - default
            - monitoring_default

networks:
    monitoring_default:
        external: true
